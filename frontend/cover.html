<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VitalPet | Science-Based Cyber Pet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #252334;
      --paper: #fff8e8;
      --mint: #8bd8bd;
      --coral: #ff7f6e;
      --sky: #8fd5ff;
      --gold: #ffd166;
      --bg-dark: #12111a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body,
    html {
      height: 100%;
      background-color: var(--bg-dark);
      font-family: "Montserrat", sans-serif;
      overflow: hidden;
    }

    .cyber-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image:
        linear-gradient(rgba(139, 216, 189, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 216, 189, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      background-position: center center;
      z-index: 1;
      transform: perspective(500px) rotateX(60deg) translateY(-100px) scale(3);
      animation: gridMove 10s linear infinite;
    }

    @keyframes gridMove {
      0% {
        transform: perspective(500px) rotateX(60deg) translateY(0) scale(3);
      }

      100% {
        transform: perspective(500px) rotateX(60deg) translateY(40px) scale(3);
      }
    }

    .cover-container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 20px;
      text-align: center;
    }

    .top-deco {
      font-family: "Orbitron", sans-serif;
      color: var(--mint);
      letter-spacing: 4px;
      font-size: 0.9rem;
      margin-bottom: 20px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 15px;
      opacity: 0.8;
    }

    .top-deco::before,
    .top-deco::after {
      content: "";
      display: block;
      width: 30px;
      height: 2px;
      background-color: var(--mint);
    }

    .main-title {
      font-family: "Orbitron", sans-serif;
      font-size: clamp(3.5rem, 10vw, 6rem);
      font-weight: 900;
      color: var(--paper);
      text-transform: uppercase;
      line-height: 1;
      letter-spacing: 2px;
      text-shadow: 4px 4px 0 var(--coral), -2px -2px 0 var(--sky);
      margin-bottom: 10px;
    }

    .sub-title {
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-weight: 900;
      color: var(--gold);
      margin-bottom: 30px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .intro-text {
      color: rgba(255, 248, 232, 0.7);
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      line-height: 1.6;
      max-width: 550px;
      margin-bottom: 50px;
      border-left: 4px solid var(--sky);
      padding-left: 15px;
      text-align: left;
    }

    .pet-showcase {
      width: 120px;
      height: 120px;
      background: rgba(139, 216, 189, 0.1);
      border: 4px solid var(--mint);
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 50px;
      box-shadow: 0 0 20px rgba(139, 216, 189, 0.2), inset 0 0 20px rgba(139, 216, 189, 0.2);
      animation: float 3s ease-in-out infinite;
    }

    .pet-showcase img {
      width: 80px;
      image-rendering: pixelated;
    }

    @keyframes float {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .enter-btn {
      display: inline-block;
      font-family: "Orbitron", sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--ink);
      background-color: var(--mint);
      padding: 18px 40px;
      text-decoration: none;
      text-transform: uppercase;
      border-radius: 0;
      box-shadow: 6px 6px 0 var(--coral);
      transition: all 0.15s ease;
      cursor: pointer;
      position: relative;
    }

    .enter-btn:hover {
      transform: translate(2px, 2px);
      box-shadow: 4px 4px 0 var(--coral);
      background-color: #a0ebd0;
    }

    .enter-btn:active {
      transform: translate(6px, 6px);
      box-shadow: 0 0 0 var(--coral);
    }

    .footer-note {
      position: absolute;
      bottom: 20px;
      font-size: 0.8rem;
      color: rgba(255, 248, 232, 0.4);
      letter-spacing: 1px;
      font-family: "Orbitron", sans-serif;
    }
  </style>
</head>
<body>
  <div class="cyber-grid"></div>

  <main class="cover-container">
    <div class="top-deco">System Initialized</div>

    <h1 class="main-title">VitalPet</h1>
    <h2 class="sub-title">The cyber pet that understands exercise physiology</h2>

    <p class="intro-text">
      Governed by real human metabolism and circadian rhythms.<br>
      Every physical step you take is the sole fuel for its evolution. Break the sedentary cycle.
    </p>

    <div class="pet-showcase">
      <img src="assets/cat_idle.png" alt="Cyber Pet">
    </div>

    <a href="index.html" class="enter-btn">ENTER APP</a>

    <div class="footer-note">V 1.0.0 · POWERED BY YOUR STEPS</div>
  </main>
</body>
</html>
